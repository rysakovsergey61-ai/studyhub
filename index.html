<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Archive v2.0</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        body { background: radial-gradient(circle at top right, #1e293b, #0f172a); min-height: 100vh; }
        .glass { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
        .card-hover:hover { transform: translateY(-5px); box-shadow: 0 10px 30px -10px rgba(59, 130, 246, 0.5); border-color: rgba(59, 130, 246, 0.4); }
        .stat-card { cursor: pointer; transition: all 0.3s ease; }
        .stat-card:hover { background: rgba(59, 130, 246, 0.1); transform: scale(1.02); }
        .stat-active { border: 1px solid #3b82f6; background: rgba(59, 130, 246, 0.15); }
    </style>
</head>
<body class="text-slate-100 font-sans antialiased">
    <div class="max-w-5xl mx-auto px-4 py-12">
        
        <header class="text-center mb-16 animate__animated animate__fadeInDown">
            <div class="inline-block px-4 py-1 rounded-full bg-blue-500/10 border border-blue-500/20 text-blue-400 text-xs font-bold mb-4 tracking-widest uppercase">
                Storage System v2.0
            </div>
            <h1 class="text-6xl font-black mb-4 tracking-tighter bg-clip-text text-transparent bg-gradient-to-b from-white to-slate-500 uppercase">
                Nexus<span class="text-blue-500">Hub</span>
            </h1>
            <p class="text-slate-400 text-lg max-w-lg mx-auto">Умный репозиторий для хранения практик и лекций.</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 animate__animated animate__fadeInUp">
            <div onclick="filterByType('all')" class="glass p-4 rounded-2xl text-center stat-card stat-active" id="stat-all">
                <div id="count-total" class="text-2xl font-bold text-blue-400">0</div>
                <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Всего работ</div>
            </div>
            <div onclick="filterByType('практика')" class="glass p-4 rounded-2xl text-center stat-card border-l-2 border-l-emerald-500/50" id="stat-pract">
                <div id="count-pract" class="text-2xl font-bold text-emerald-400">0</div>
                <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Практики</div>
            </div>
            <div onclick="filterByType('лекция')" class="glass p-4 rounded-2xl text-center stat-card border-l-2 border-l-purple-500/50" id="stat-lect">
                <div id="count-lect" class="text-2xl font-bold text-purple-400">0</div>
                <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Лекции</div>
            </div>
            <div class="glass p-4 rounded-2xl text-center border-l-2 border-l-orange-500/50">
                <div id="count-subj" class="text-2xl font-bold text-orange-400">0</div>
                <div class="text-[10px] text-slate-500 uppercase font-black tracking-widest">Предметы</div>
            </div>
        </div>

        <div class="relative max-w-2xl mx-auto mb-12 animate__animated animate__fadeIn">
            <input type="text" id="search" placeholder="Поиск по названию или предмету..." 
                   class="glass w-full pl-6 pr-4 py-4 rounded-2xl focus:ring-2 focus:ring-blue-500 outline-none transition-all text-lg">
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
            </div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
