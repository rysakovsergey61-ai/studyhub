<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Архив ИМСИТА | PRO Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <style>
        :root {
            --neon-color: #ffffff; /* По умолчанию - белый неон */
            --bg-dark: #000000;
        }

        body { 
            background: radial-gradient(circle at center, #111 0%, var(--bg-dark) 100%);
            min-height: 100vh; color: #fff; transition: background 0.5s ease; 
        }

        /* Кнопка и меню выбора цвета */
        .theme-panel { position: fixed; top: 20px; right: 20px; z-index: 100; }
        .theme-btn {
            background: rgba(0,0,0,0.8); border: 2px solid var(--neon-color);
            padding: 8px 18px; border-radius: 12px; font-weight: 900; font-size: 10px;
            text-transform: uppercase; letter-spacing: 1px; cursor: pointer;
            box-shadow: 0 0 15px var(--neon-color); transition: all 0.3s;
        }
        .color-menu {
            display: none; position: absolute; top: 50px; right: 0;
            background: rgba(0,0,0,0.95); border: 1px solid rgba(255,255,255,0.2);
            padding: 12px; border-radius: 20px; grid-template-columns: repeat(3, 1fr); gap: 10px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .color-dot { width: 30px; height: 30px; border-radius: 50%; cursor: pointer; border: 2px solid rgba(255,255,255,0.1); transition: transform 0.2s; }
        .color-dot:hover { transform: scale(1.2); border-color: #fff; }

        /* Динамический неон */
        .neon-text { color: var(--neon-color); text-shadow: 0 0 10px var(--neon-color); transition: all 0.4s; }
        .stat-active { border: 2px solid var(--neon-color) !important; box-shadow: 0 0 20px var(--neon-color) !important; }
        
        .stat-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); cursor: pointer; transition: all 0.3s; }
        .stat-card:hover { background: rgba(255,255,255,0.05); transform: translateY(-3px); }

        .subj-btn { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); transition: all 0.2s; }
        .subj-btn.active-subj { border-color: var(--neon-color); color: var(--neon-color); box-shadow: 0 0 15px var(--neon-color); }
        
        #search { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); color: #fff; transition: all 0.3s; }
        #search:focus { border-color: var(--neon-color); box-shadow: 0 0 20px var(--neon-color); outline: none; }

        .glass-card { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.08); transition: all 0.3s; }
        .glass-card:hover { border-color: var(--neon-color); box-shadow: 0 0 25px var(--neon-color); transform: translateY(-8px); }
        
        .btn-open { border: 1px solid rgba(255,255,255,0.1); transition: all 0.3s; }
        .btn-open:hover { background: var(--neon-color); color: #000; font-weight: 900; }
    </style>
</head>
<body class="font-sans antialiased">
    
    <div class="theme-panel">
        <button onclick="toggleMenu()" id="main-theme-btn" class="theme-btn">Стиль</button>
        <div id="color-menu" class="color-menu animate__animated animate__fadeIn">
            <div class="color-dot" style="background: #ffffff;" onclick="setTheme('#ffffff')"></div>
            <div class="color-dot" style="background: #00f2ff;" onclick="setTheme('#00f2ff')"></div>
            <div class="color-dot" style="background: #39ff14;" onclick="setTheme('#39ff14')"></div>
            <div class="color-dot" style="background: #bc13fe;" onclick="setTheme('#bc13fe')"></div>
            <div class="color-dot" style="background: #ff0055;" onclick="setTheme('#ff0055')"></div>
            <div class="color-dot" style="background: #ffe000;" onclick="setTheme('#ffe000')"></div>
        </div>
    </div>

    <div class="max-w-6xl mx-auto px-4 py-12">
        <header class="text-center mb-16 animate__animated animate__fadeInDown">
            <h1 class="text-5xl md:text-7xl font-black mb-4 tracking-tighter uppercase italic">
                Архив<span class="neon-text"> ИМСИТА</span>
            </h1>
            <p class="text-gray-500 text-lg tracking-widest uppercase font-light">Digital Repository / v3.0</p>
        </header>

        <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-12 animate__animated animate__fadeInUp">
            <div onclick="filterByType('all')" class="p-8 rounded-[2rem] text-center stat-card stat-active" id="stat-all">
                <div id="count-total" class="text-5xl font-black mb-1">0</div>
                <div class="text-[9px] uppercase font-black tracking-widest opacity-40">Всего работ</div>
            </div>
            <div onclick="filterByType('практика')" class="p-8 rounded-[2rem] text-center stat-card" id="stat-pract">
                <div id="count-pract" class="text-5xl font-black mb-1 text-emerald-500">0</div>
                <div class="text-[9px] uppercase font-black tracking-widest opacity-40">Практики</div>
            </div>
            <div onclick="filterByType('лекция')" class="p-8 rounded-[2rem] text-center stat-card" id="stat-lect">
                <div id="count-lect" class="text-5xl font-black mb-1 text-purple-500">0</div>
                <div class="text-[9px] uppercase font-black tracking-widest opacity-40">Лекции</div>
            </div>
            <div class="p-8 rounded-[2rem] text-center stat-card border-dashed">
                <div id="count-subj" class="text-5xl font-black mb-1 text-orange-500">0</div>
                <div class="text-[9px] uppercase font-black tracking-widest opacity-40">Предметы</div>
            </div>
        </div>

        <div class="relative mb-12 animate__animated animate__fadeIn">
            <input type="text" id="search" placeholder="Поиск по архиву..." 
                   class="w-full px-8 py-6 rounded-3xl text-xl transition-all">
        </div>

        <div class="mb-16 animate__animated animate__fadeIn">
            <div class="flex flex-wrap gap-3" id="subject-filters">
                <button onclick="filterBySubject('all')" class="subj-btn active-subj px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">Все</button>
                <button onclick="filterBySubject('Информатика')" class="subj-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">Информатика</button>
                <button onclick="filterBySubject('Математика')" class="subj-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">Математика</button>
                <button onclick="filterBySubject('История')" class="subj-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">История</button>
                <button onclick="filterBySubject('Физика')" class="subj-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">Физика</button>
                <button onclick="filterBySubject('Проект')" class="subj-btn px-6 py-3 rounded-xl text-[10px] font-black uppercase tracking-tighter">Проекты</button>
            </div>
        </div>

        <div id="content" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </div>
    <script src="scripts.js"></script>
</body>
</html>
