<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Темы материалов</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { 
            --neon-color: #bc13fe;
            --grad-header: linear-gradient(135deg, #c41e3a 0%, #2d5016 100%);
            --grad-footer: linear-gradient(135deg, #ffd700 0%, #9933ff 100%);
            --grad-accent: linear-gradient(135deg, #00bfff 0%, #ffffff 100%);
        }
        body { 
            background: linear-gradient(-45deg, #1a0d2e 0%, #2d1b4e 25%, #1a3a3a 50%, #3d1a1a 75%, #2d2844 100%);
            background-size: 400% 400%;
            animation: gradientBg 15s ease infinite;
            color: #fff; 
            font-family: sans-serif; 
            padding: 40px 20px;
        }
        @keyframes gradientBg {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .neon-text { 
            color: var(--neon-color); 
            text-shadow: 0 0 15px var(--neon-color), 0 2px 4px rgba(0,0,0,0.5);
        }
        a {
            text-shadow: 0 1px 3px rgba(0,0,0,0.5);
        }
        .topic-row { 
            background: rgba(255,255,255,0.03); 
            border: 2px solid rgba(0, 191, 255, 0.3);
            padding: 20px; 
            border-radius: 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            margin-bottom: 12px; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0,0,0,0.2);
        }
        .topic-row:hover { 
            border-color: #00bfff;
            background: rgba(0, 191, 255, 0.08);
            transform: translateX(5px);
            box-shadow: 0 6px 25px rgba(0, 191, 255, 0.2);
        }
        .btn-link { 
            background: var(--grad-footer);
            color: #000; 
            padding: 10px 25px; 
            border-radius: 12px; 
            font-weight: 900; 
            text-decoration: none; 
            text-transform: uppercase; 
            font-size: 12px; 
            transition: 0.3s;
            border: none;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);
        }
        .btn-link:hover { 
            filter: brightness(1.2); 
            transform: scale(1.05);
            box-shadow: 0 6px 25px rgba(255, 215, 0, 0.4);
        }
    </style>
</head>
<body>
    <div class="max-w-3xl mx-auto">
        <a href="index.html" style="color: #00bfff; text-decoration: none; font-weight: bold; text-transform: uppercase; transition: 0.3s;">← НАЗАД В АРХИВ</a>
        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 32px;">
            <h1 id="subject-title" class="text-4xl font-black uppercase neon-text">...</h1>
            <a id="tg-button" href="https://t.me/arhivImsita" target="_blank" style="display: none; background: linear-gradient(135deg, #ffd700 0%, #9933ff 100%); color: #000; padding: 12px 25px; border-radius: 12px; font-weight: 900; text-decoration: none; text-transform: uppercase; font-size: 12px; box-shadow: 0 4px 15px rgba(255, 215, 0, 0.2);">TG КАНАЛ</a>
        </div>
        <div id="topics-list" class="mt-10"></div>
    </div>

    <script>
        // Подтягиваем выбранный пользователем цвет
        const savedColor = localStorage.getItem('user-neon') || '#bc13fe';
        document.documentElement.style.setProperty('--neon-color', savedColor);

        const params = new URLSearchParams(window.location.search);
        const name = params.get('name');
        const type = params.get('type');
        document.getElementById('subject-title').innerText = name;

        fetch('data.json').then(res => res.json()).then(data => {
            // Фильтруем данные по предмету и типу
            const filtered = data.filter(i => 
                i.subject === name && 
                i.type === type
            );

            const container = document.getElementById('topics-list');
            
            if (filtered.length === 0) {
                container.innerHTML = '<p class="text-gray-500 uppercase font-bold">Материалов пока нет...</p>';
                return;
            }

            // Показываем кнопку Telegram в заголовке, если работ больше 5
            const tgButton = document.getElementById('tg-button');
            if (filtered.length > 5) {
                tgButton.style.display = 'inline-block';
            }

            // Ограничиваем вывод на 5 работ
            const displayed = filtered.slice(0, 5);
            const remaining = filtered.length - displayed.length;

            let html = displayed.map(t => `
                <div class="topic-row">
                    <span class="font-bold uppercase tracking-tight">${t.title}</span>
                    <a href="${t.link}" target="_blank" class="btn-link">
                        Открыть Диск
                    </a>
                </div>
            `).join('');

            // Добавляем кнопку для остальных работ, если их больше 5
            if (remaining > 0) {
                html += `
                    <div class="topic-row" style="background: rgba(188, 19, 254, 0.1); border-color: var(--neon-color);">
                        <span class="font-bold uppercase tracking-tight neon-text">Остальные ${remaining} работ в Telegram</span>
                        <a href="https://t.me/arhivImsita" target="_blank" class="btn-link">
                            В Telegram
                        </a>
                    </div>
                `;
            }

            container.innerHTML = html;
        });
    </script>
</body>
</html>
